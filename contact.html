<section class="contact">

    <div class="container">

        <div class="section-title">
            <h2>Book Your Session</h2>
            <p>Fill the form and we will contact you via WhatsApp</p>
        </div>

        <form id="waForm" class="contact-form">

            <input type="text" id="name" placeholder="Your Name" required>

            <input type="text" id="event" placeholder="Event Type (Wedding, Graduation, etc)" required>

            <input type="date" id="date" required>

            <textarea id="message" placeholder="Additional Message"></textarea>

            <button type="submit" class="btn-primary">
                Send via WhatsApp
            </button>

        </form>

    </div>

</section>
