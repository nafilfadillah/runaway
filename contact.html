<section id="contact" class="contact">

    <div class="container">

        <div class="section-title">
            <h2>Book Your Session</h2>
            <p>Fill the form and we will contact you via WhatsApp</p>
        </div>

        <div class="contact-grid">

            <!-- INFO -->
            <div class="contact-info">
                <h3>Runaway Studio</h3>
                <p>Photography • Videography • Creative Studio</p>

                <p><i class="fa fa-phone"></i> 0857-7444-7910</p>
                <p><i class="fa fa-envelope"></i> runawaystudio@gmail.com</p>
                <p><i class="fa fa-location-dot"></i> Indonesia</p>
            </div>

            <!-- FORM BOOKING -->
            <form class="contact-form" onsubmit="sendToWA(event)">

                <input type="text" id="name" placeholder="Your Name" required>

                <input type="text" id="event" placeholder="Event Type (Wedding, Graduation, dll)" required>

                <input type="date" id="date" required>

                <textarea id="message" placeholder="Additional Message (optional)"></textarea>

                <button type="submit" class="btn-primary">
                    Send via WhatsApp
                </button>

            </form>

        </div>

    </div>

</section>
