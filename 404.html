<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
  .notfound-section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: var(--bg2);
    padding: 40px 20px;
  }
  .notfound-inner { max-width: 600px; }
  .notfound-number {
    font-family: 'Playfair Display', serif;
    font-size: 10rem;
    line-height: 1;
    font-weight: 800;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    animation: pulse404 3s ease-in-out infinite;
  }
  @keyframes pulse404 {
    0%, 100% { opacity: 1; }
    50% { opacity: .7; }
  }
  .notfound-inner h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 14px;
  }
  .notfound-inner p {
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.8;
    margin-bottom: 36px;
  }
  .notfound-links {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .notfound-icon {
    font-size: 4rem;
    margin-bottom: 20px;
    animation: float404 3s ease-in-out infinite;
  }
  @keyframes float404 {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
</style>
</head>
